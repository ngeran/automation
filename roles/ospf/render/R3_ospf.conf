apply-groups [ basic OSPF ];
routing-options {

    router-id 172.30.5.3;
}
protocols {
    ospf {
          area 0.0.0.0 {
                interface ge-0/0/0.123;
                }
          area 0.0.0.1 {
                interface ge-0/0/0.134;
                }
          area 0.0.0.10 {
                interface ge-0/0/0.139;
                }
    }
}
