    OSPF {
            protocols {
                ospf {
                    traffic-engineering;
                    area 0.0.0.0 {
                    interface <ge-*> {
                        interface-type p2p;
                        link-protection;
                        ldp-synchronization;
                        bfd-liveness-detection {
                            minimum-interval 300;
                            multiplier 3;
                            }
                        }
                        interface em0.0 {
                            disable;
                        }
                        interface fxp0.0 {
                            disable;
                        }
                        interface lo0.0 {
                            passive;
                        }
                    }
                }
            }
        }
    }
apply-groups basic;
